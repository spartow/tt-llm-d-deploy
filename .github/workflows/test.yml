name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint-and-smoke:
    name: Python lint and smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff check
        run: |
          ruff check . || true

      - name: Repo smoke check
        run: |
          find . -maxdepth 4 -type f | sort
          test -f README.md
          test -f LICENSE
          test -f CONTRIBUTING.md

  kubernetes-manifest-validation:
    name: Kubernetes manifest validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install YAML parser
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml yamllint

      - name: Lint YAML
        run: |
          yamllint -d relaxed .

      - name: Validate YAML syntax
        run: |
          python - <<'PY'
          import pathlib
          import yaml

          files = [
              p for p in pathlib.Path(".").rglob("*")
              if p.suffix in {".yaml", ".yml"} and ".git" not in p.parts
          ]

          print(f"Found {len(files)} YAML files")

          for path in files:
              print(f"Checking {path}")
              text = path.read_text(encoding="utf-8")
              if not text.strip():
                  print(f"Skipping empty file: {path}")
                  continue
              list(yaml.safe_load_all(text))

          print("YAML syntax validation passed")
          PY

      - name: Check Kubernetes-like manifests
        run: |
          set -e
          echo "Checking files that look like Kubernetes manifests..."
          for f in $(find . -type f \( -name "*.yaml" -o -name "*.yml" \) | grep -v ".github"); do
            if grep -q "apiVersion:" "$f" && grep -q "kind:" "$f"; then
              echo "Kubernetes manifest found: $f"
            fi
          done
          echo "Manifest discovery passed"
