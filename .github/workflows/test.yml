name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint-and-smoke:
    name: Python lint and smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff check
        run: |
          ruff check . || true

      - name: Repo smoke check
        run: |
          test -f README.md
          test -f LICENSE
          test -f CONTRIBUTING.md
          find . -maxdepth 4 -type f | sort

  yaml-validation:
    name: YAML validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install YAML tools
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml yamllint

      - name: Lint YAML
        run: |
          yamllint -d relaxed .

      - name: Validate YAML syntax
        run: |
          python - <<'PY'
          import pathlib
          import yaml

          files = [
              p for p in pathlib.Path(".").rglob("*")
              if p.suffix in {".yaml", ".yml"} and ".git" not in p.parts
          ]

          print(f"Found {len(files)} YAML files")

          for path in files:
              print(f"Checking {path}")
              text = path.read_text(encoding="utf-8")
              if not text.strip():
                  print(f"Skipping empty file: {path}")
                  continue
              list(yaml.safe_load_all(text))

          print("YAML validation passed")
          PY
