apiVersion: apps/v1
kind: Deployment
metadata:
  name: hetroserve-redis
  namespace: hetroserve-demo
  labels:
    app: hetroserve-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hetroserve-redis
  template:
    metadata:
      labels:
        app: hetroserve-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: hetroserve-redis
  namespace: hetroserve-demo
  labels:
    app: hetroserve-redis
spec:
  type: ClusterIP
  selector:
    app: hetroserve-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
