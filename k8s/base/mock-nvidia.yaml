apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-nvidia
  namespace: hetroserve-demo
  labels:
    app: mock-nvidia
    vendor: nvidia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-nvidia
  template:
    metadata:
      labels:
        app: mock-nvidia
        vendor: nvidia
    spec:
      containers:
        - name: mock-nvidia
          image: hetroserve/mock-endpoint:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: VENDOR
              value: "nvidia"
            - name: MODEL_NAME
              value: "mock-nvidia-a100"
            - name: BASE_LATENCY_MS
              value: "80"
            - name: TOKENS_PER_SECOND
              value: "120"
            - name: COST_PER_1K_TOKENS
              value: "0.020"
---
apiVersion: v1
kind: Service
metadata:
  name: mock-nvidia
  namespace: hetroserve-demo
  labels:
    app: mock-nvidia
    vendor: nvidia
spec:
  selector:
    app: mock-nvidia
  ports:
    - name: http
      port: 8000
      targetPort: 8000
