apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-tenstorrent
  namespace: hetroserve-demo
  labels:
    app: mock-tenstorrent
    vendor: tenstorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-tenstorrent
  template:
    metadata:
      labels:
        app: mock-tenstorrent
        vendor: tenstorrent
    spec:
      containers:
        - name: mock-tenstorrent
          image: hetroserve/mock-endpoint:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: VENDOR
              value: "tenstorrent"
            - name: MODEL_NAME
              value: "mock-tt-wormhole"
            - name: BASE_LATENCY_MS
              value: "130"
            - name: TOKENS_PER_SECOND
              value: "70"
            - name: COST_PER_1K_TOKENS
              value: "0.006"
---
apiVersion: v1
kind: Service
metadata:
  name: mock-tenstorrent
  namespace: hetroserve-demo
  labels:
    app: mock-tenstorrent
    vendor: tenstorrent
spec:
  selector:
    app: mock-tenstorrent
  ports:
    - name: http
      port: 8000
      targetPort: 8000
