apiVersion: apps/v1
kind: Deployment
metadata:
  name: hetroserve-router
  namespace: hetroserve-demo
  labels:
    app: hetroserve-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hetroserve-router
  template:
    metadata:
      labels:
        app: hetroserve-router
    spec:
      containers:
        - name: hetroserve-router
          image: hetroserve/router:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SCORER_URL
              value: "http://hetroserve-scorer:8080"
            - name: SCORER_MODE
              value: "epp"
---
apiVersion: v1
kind: Service
metadata:
  name: hetroserve-router
  namespace: hetroserve-demo
  labels:
    app: hetroserve-router
spec:
  selector:
    app: hetroserve-router
  ports:
    - name: http
      port: 8081
      targetPort: 8081
