apiVersion: apps/v1
kind: Deployment
metadata:
  name: hetroserve-router
  namespace: hetroserve-demo
  labels:
    app: hetroserve-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hetroserve-router
  template:
    metadata:
      labels:
        app: hetroserve-router
    spec:
      containers:
        - name: hetroserve-router
          image: hetroserve/router:dev
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SCORER_URL
              value: "http://hetroserve-scorer:8080"
            - name: REDIS_HOST
              value: "hetroserve-redis"
            - name: REDIS_PORT
              value: "6379"
            - name: RESULT_TIMEOUT_SECONDS
              value: "30"
            - name: RESULT_POLL_INTERVAL_SECONDS
              value: "0.05"
---
apiVersion: v1
kind: Service
metadata:
  name: hetroserve-router
  namespace: hetroserve-demo
  labels:
    app: hetroserve-router
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  selector:
    app: hetroserve-router
  ports:
    - name: http
      port: 8080
      targetPort: 8080
