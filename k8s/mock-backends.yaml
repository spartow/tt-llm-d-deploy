apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-nvidia
  namespace: hetroserve-demo
  labels:
    app: mock-nvidia
    hetroserve.io/component: backend
    hetroserve.io/vendor: nvidia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-nvidia
  template:
    metadata:
      labels:
        app: mock-nvidia
        hetroserve.io/component: backend
        hetroserve.io/vendor: nvidia
    spec:
      containers:
        - name: mock-nvidia
          image: hetroserve/mock-backend:dev
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: BACKEND_NAME
              value: "nvidia"
            - name: VENDOR
              value: "nvidia"
            - name: MODEL
              value: "mock-nvidia-a100"
            - name: COST_PER_1K_TOKENS
              value: "0.020"
            - name: BASE_LATENCY_MS
              value: "120"
            - name: QUEUE_DEPTH
              value: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: mock-nvidia
  namespace: hetroserve-demo
  labels:
    app: mock-nvidia
    hetroserve.io/component: backend
    hetroserve.io/vendor: nvidia
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8000"
spec:
  selector:
    app: mock-nvidia
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
